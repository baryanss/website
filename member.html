<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSP | Member Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(90deg, #FF6B00, #FFB347); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        [x-cloak] { display: none !important; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .dot { transition: all 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900" x-data="yspApp()">

    <nav class="fixed top-0 w-full z-50 glass border-b border-orange-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center relative">
            <div class="text-2xl font-bold flex items-center gap-2 cursor-pointer" @click="page = 'home'">
                <img src="ysp.jpg" alt="YSP Fist Logo" class="w-10 h-10 object-contain">
                <span class="tracking-tighter">YSP<span class="text-orange-500">PH</span></span>
            </div>
            
            <div class="hidden md:flex space-x-8 font-medium text-sm uppercase tracking-widest text-gray-500">
                <a @click="page = 'home'" :class="page === 'home' ? 'text-orange-500 border-b-2 border-orange-500' : 'text-gray-500 hover:text-orange-500'" class="pb-1 cursor-pointer transition-all">Dashboard</a>
                <a @click="page = 'explore'" :class="page === 'explore' ? 'text-orange-500 border-b-2 border-orange-500' : 'text-gray-500 hover:text-orange-500'" class="pb-1 cursor-pointer transition-all">Explore</a>
                <a @click="page = 'volunteer'" :class="page === 'volunteer' ? 'text-orange-500 border-b-2 border-orange-500' : 'text-gray-500 hover:text-orange-500'" class="pb-1 cursor-pointer transition-all">Opportunities</a>
            </div>

            <div class="flex items-center gap-4 relative" x-data="{ open: false }">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] font-bold text-gray-400 uppercase leading-none">Verified Member</p>
                    <p class="text-sm font-bold" x-text="userName"></p>
                </div>
                <button @click="open = !open" class="w-10 h-10 bg-orange-100 rounded-full border-2 border-orange-500 flex items-center justify-center overflow-hidden hover:scale-105 transition">
                    <img :src="`https://api.dicebear.com/7.x/avataaars/svg?seed=${userName}`" alt="avatar">
                </button>

                <div x-show="open" @click.away="open = false" x-cloak
                    class="absolute right-0 top-12 w-48 bg-white rounded-2xl shadow-xl border border-gray-100 py-2 z-50">
                    <button @click="page = 'certificates'; open = false" class="block w-full text-left px-4 py-2 text-sm hover:bg-gray-50">My Certificates</button>
                    <button @click="page = 'settings'; open = false" class="block w-full text-left px-4 py-2 text-sm hover:bg-gray-50">Account Settings</button>
                    <hr class="my-2 border-gray-100">
                    <button @click="logout()" class="block w-full text-left px-4 py-2 text-sm text-red-500 font-bold hover:bg-red-50">Sign Out</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-24 min-h-screen">

        <template x-if="page === 'home'">
            <section class="animate-fadeIn p-6">
                <div class="max-w-7xl mx-auto py-12">
                    <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                        <div>
                            <h1 class="text-4xl md:text-5xl font-bold mb-2 text-gray-900">Mabuhay, <span class="gradient-text" x-text="userName + '!'"></span></h1>
                            <p class="text-gray-500 italic">Ready to make an impact today?</p>
                        </div>
                        <div class="flex gap-3">
                            <div class="bg-white p-4 rounded-2xl border border-orange-100 shadow-sm text-center min-w-[120px]">
                                <p class="text-2xl font-bold text-orange-500" x-text="joinedEvents.length * 4"></p>
                                <p class="text-[10px] uppercase font-bold text-gray-400">Hours Earned</p>
                            </div>
                        </div>
                    </div>
                    
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> 
                        Your Upcoming Activities
                    </h2>

                    <template x-if="joinedEvents.length === 0">
                        <div class="bg-white p-12 rounded-[2rem] border-2 border-dashed border-gray-200 text-center mb-12">
                            <p class="text-gray-400 mb-4">You haven't joined any activities yet.</p>
                            <button @click="page = 'explore'" class="text-orange-500 font-bold hover:underline underline-offset-4 text-sm">Find an activity to join →</button>
                        </div>
                    </template>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-20">
                        <template x-for="event in joinedEvents" :key="event.id">
                            <div class="bg-white p-6 rounded-[2rem] border-l-8 border-l-orange-500 shadow-sm flex justify-between items-center animate-fadeIn">
                                <div>
                                    <h3 class="font-bold text-lg text-gray-800" x-text="event.name"></h3>
                                    <p class="text-sm text-gray-500" x-text="event.date + ' • ' + event.tag"></p>
                                </div>
                                <div class="flex flex-col items-end gap-1">
                                    <span class="bg-orange-50 text-orange-600 px-4 py-1 rounded-full text-[10px] font-black uppercase">Confirmed</span>
                                    <button @click="leaveEvent(event.id)" class="text-[10px] text-gray-300 hover:text-red-500 transition">Cancel Registration</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="page === 'certificates'">
            <section class="animate-fadeIn p-6">
                <div class="max-w-7xl mx-auto py-12">
                    <div class="mb-10">
                        <h1 class="text-4xl font-bold mb-2 text-gray-900">My <span class="text-orange-500">Certificates</span></h1>
                        <p class="text-gray-500">View and download your earned credentials and service recognition.</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <template x-for="cert in certificates" :key="cert.id">
                            <div class="bg-white rounded-[2rem] border border-gray-100 shadow-sm overflow-hidden group hover:shadow-xl transition-all">
                                <div class="aspect-[4/3] bg-gray-100 relative flex items-center justify-center p-8">
                                    <div class="w-full h-full border-4 border-orange-200 rounded flex flex-col items-center justify-center text-center p-4 bg-white shadow-inner relative overflow-hidden">
                                        <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-orange-500"></div>
                                        <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-orange-500"></div>
                                        <p class="text-[8px] font-bold text-orange-500 uppercase tracking-widest mb-1">Official Recognition</p>
                                        <h4 class="text-xs font-bold text-gray-800 mb-2 leading-tight" x-text="cert.name"></h4>
                                        <div class="w-10 h-[1px] bg-gray-300 mb-2"></div>
                                        <p class="text-[6px] text-gray-400" x-text="'Issued to ' + userName"></p>
                                    </div>
                                </div>
                                <div class="p-6">
                                    <div class="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 class="font-bold text-gray-900" x-text="cert.name"></h3>
                                            <p class="text-xs text-gray-400" x-text="'Issued: ' + cert.date"></p>
                                        </div>
                                        <span class="bg-green-50 text-green-600 text-[10px] font-bold px-2 py-1 rounded">Verified</span>
                                    </div>
                                    <button @click="alert('Downloading Certificate PDF...')" class="w-full py-3 bg-gray-900 text-white rounded-xl text-sm font-bold hover:bg-orange-500 transition-colors flex items-center justify-center gap-2">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                        Download PDF
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="page === 'settings'">
            <section class="animate-fadeIn p-6">
                <div class="max-w-4xl mx-auto py-12">
                    <div class="mb-10">
                        <h1 class="text-4xl font-bold mb-2 text-gray-900">Account <span class="text-orange-500">Settings</span></h1>
                        <p class="text-gray-500">Manage your profile and security preferences.</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8" x-data="{ settingsTab: 'profile' }">
                        <div class="space-y-2">
                            <button @click="settingsTab = 'profile'" :class="settingsTab === 'profile' ? 'bg-orange-500 text-white shadow-lg shadow-orange-100 font-bold' : 'text-gray-500 hover:bg-white font-medium'" class="w-full text-left px-6 py-4 rounded-2xl transition-all">General Profile</button>
                            <button @click="settingsTab = 'notifications'" :class="settingsTab === 'notifications' ? 'bg-orange-500 text-white shadow-lg shadow-orange-100 font-bold' : 'text-gray-500 hover:bg-white font-medium'" class="w-full text-left px-6 py-4 rounded-2xl transition-all">Notifications</button>
                            <button @click="settingsTab = 'security'" :class="settingsTab === 'security' ? 'bg-orange-500 text-white shadow-lg shadow-orange-100 font-bold' : 'text-gray-500 hover:bg-white font-medium'" class="w-full text-left px-6 py-4 rounded-2xl transition-all">Privacy & Security</button>
                        </div>

                        <div class="lg:col-span-2 space-y-6">
                            
                            <div x-show="settingsTab === 'profile'" class="animate-fadeIn space-y-6">
                                <div class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
                                    <h3 class="text-lg font-bold mb-6 text-gray-800">Personal Information</h3>
                                    <div class="space-y-4">
                                        <div class="flex items-center gap-6 mb-6">
                                            <div class="relative">
                                                <img :src="`https://api.dicebear.com/7.x/avataaars/svg?seed=${userName}`" class="w-20 h-20 bg-orange-50 rounded-full border-2 border-orange-500">
                                            </div>
                                            <div>
                                                <p class="font-bold text-gray-800">Profile Photo</p>
                                                <p class="text-xs text-gray-400">Auto-generated based on your name.</p>
                                            </div>
                                        </div>
                                        <div>
                                            <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-1">Full Name</label>
                                            <input type="text" x-model="userName" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition">
                                        </div>
                                        <div class="grid grid-cols-2 gap-4">
                                            <div>
                                                <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-1">Email</label>
                                                <input type="email" value="member@ysp.ph" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 focus:outline-none">
                                            </div>
                                            <div>
                                                <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-1">Location</label>
                                                <input type="text" value="Manila, PH" class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 focus:outline-none">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button @click="alert('Profile updated successfully!')" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold hover:shadow-xl hover:bg-orange-600 transition-all">Save Profile Changes</button>
                            </div>

                            <div x-show="settingsTab === 'notifications'" class="animate-fadeIn space-y-6" x-cloak>
                                <div class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
                                    <h3 class="text-lg font-bold mb-6 text-gray-800">Notification Preferences</h3>
                                    <div class="space-y-6">
                                        <div class="flex justify-between items-center">
                                            <div>
                                                <p class="font-bold text-sm">Mission Alerts</p>
                                                <p class="text-xs text-gray-400">Get notified when new volunteer roles are posted.</p>
                                            </div>
                                            <button @click="emailNotif = !emailNotif" :class="emailNotif ? 'bg-orange-500' : 'bg-gray-200'" class="w-11 h-6 rounded-full relative transition-colors duration-200 focus:outline-none">
                                                <span :class="emailNotif ? 'translate-x-6' : 'translate-x-1'" class="dot absolute top-1 left-0 bg-white w-4 h-4 rounded-full shadow transform transition-transform duration-200"></span>
                                            </button>
                                        </div>
                                        <div class="flex justify-between items-center">
                                            <div>
                                                <p class="font-bold text-sm">Event Reminders</p>
                                                <p class="text-xs text-gray-400">Notifications for your upcoming joined activities.</p>
                                            </div>
                                            <button @click="eventReminders = !eventReminders" :class="eventReminders ? 'bg-orange-500' : 'bg-gray-200'" class="w-11 h-6 rounded-full relative transition-colors duration-200 focus:outline-none">
                                                <span :class="eventReminders ? 'translate-x-6' : 'translate-x-1'" class="dot absolute top-1 left-0 bg-white w-4 h-4 rounded-full shadow transform transition-transform duration-200"></span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div x-show="settingsTab === 'security'" class="animate-fadeIn space-y-6" x-cloak>
                                <div class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
                                    <h3 class="text-lg font-bold mb-6 text-gray-800">Security</h3>
                                    <div class="space-y-4">
                                        <div>
                                            <p class="font-bold text-sm mb-2">Password Management</p>
                                            <button @click="alert('Password reset link sent to member@ysp.ph')" class="w-full text-left px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-sm font-medium hover:bg-orange-50 transition">Send Reset Link</button>
                                        </div>
                                        <hr class="border-gray-50 my-4">
                                        <div class="flex justify-between items-center">
                                            <div>
                                                <p class="font-bold text-sm">Public Portfolio</p>
                                                <p class="text-xs text-gray-400">Allow others to see your earned certificates.</p>
                                            </div>
                                            <button @click="publicProfile = !publicProfile" :class="publicProfile ? 'bg-orange-500' : 'bg-gray-200'" class="w-11 h-6 rounded-full relative transition-colors duration-200 focus:outline-none">
                                                <span :class="publicProfile ? 'translate-x-6' : 'translate-x-1'" class="dot absolute top-1 left-0 bg-white w-4 h-4 rounded-full shadow transform transition-transform duration-200"></span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="bg-red-50 p-8 rounded-[2.5rem] border border-red-100">
                                    <h3 class="text-lg font-bold mb-2 text-red-600">Danger Zone</h3>
                                    <p class="text-xs text-red-500 mb-6 leading-relaxed">Once you delete your account, there is no going back. All your earned certificates and hours will be permanently removed.</p>
                                    <button @click="if(confirm('Are you absolutely sure? This will wipe your history.')) logout()" class="px-6 py-3 bg-red-600 text-white rounded-xl font-bold text-sm hover:bg-red-700 transition">Delete Account</button>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="page === 'explore'">
            <section class="animate-fadeIn p-6">
                <div class="max-w-7xl mx-auto py-12">
                    <div class="mb-12">
                        <h1 class="text-4xl font-bold mb-2">Find Your <span class="text-orange-500">Mission</span></h1>
                        <p class="text-gray-500">Browse and join events that match your passion.</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <template x-for="event in events" :key="event.id">
                            <div class="bg-white rounded-[2.5rem] overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition-all group">
                                <div class="h-48 overflow-hidden relative">
                                    <img :src="event.img" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                                    <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-4 py-1 rounded-full text-[10px] font-black uppercase text-orange-600 shadow-sm" x-text="event.tag"></div>
                                </div>
                                <div class="p-8">
                                    <h3 class="text-xl font-bold mb-2 text-gray-900" x-text="event.name"></h3>
                                    <p class="text-gray-500 text-sm mb-6 line-clamp-2 leading-relaxed" x-text="event.desc"></p>
                                    <button @click="joinEvent(event)" 
                                            :disabled="isJoined(event.id)"
                                            :class="isJoined(event.id) ? 'bg-gray-100 text-gray-400 cursor-default' : 'bg-orange-500 hover:bg-orange-600 text-white hover:shadow-lg hover:shadow-orange-200'"
                                            class="w-full py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2">
                                        <span x-text="isJoined(event.id) ? 'Joined ✓' : 'Join Now'"></span>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="page === 'volunteer'">
            <section class="animate-fadeIn p-6">
                <div class="max-w-7xl mx-auto py-12">
                    <div class="mb-10">
                        <h1 class="text-4xl font-bold mb-2 text-gray-900">Growth <span class="text-orange-500">Opportunities</span></h1>
                        <p class="text-gray-500">Apply for long-term leadership roles and gain new skills.</p>
                    </div>
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2 italic text-gray-700">Permanent Roles</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-12">
                        <template x-for="role in roles" :key="role.id">
                            <div class="bg-white p-8 rounded-[2rem] border border-orange-100 shadow-sm flex flex-col md:flex-row gap-6 hover:shadow-md transition">
                                <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center text-white shrink-0 shadow-lg shadow-orange-100">
                                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold text-gray-900" x-text="role.title"></h3>
                                    <p class="text-sm text-gray-500 mb-4" x-text="role.desc"></p>
                                    <div class="flex items-center gap-4">
                                        <span class="px-3 py-1 bg-orange-50 text-orange-600 rounded-full text-[10px] font-bold" x-text="role.time"></span>
                                        <button @click="alert('Application submitted!')" class="text-orange-500 text-xs font-bold hover:underline">Apply Now →</button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </template>

    </main>

    <script>
        function yspApp() {
            const savedName = localStorage.getItem('userName') || 'Alex Dela Cruz';
            
            return {
                page: 'home',
                userName: savedName,
                
                // Settings States
                emailNotif: true,
                eventReminders: true,
                publicProfile: false,

                events: [
                    { id: 1, name: 'Mangrove Planting', date: 'May 15, 2026', tag: 'Environment', desc: 'Help us restore the coastline in Bataan by planting 500 seedlings.', img: 'https://images.unsplash.com/photo-1584564504473-8278f9976775?auto=format&fit=crop&w=800' },
                    { id: 2, name: 'Street Library Set-up', date: 'June 02, 2026', tag: 'Education', desc: 'Building mini-libraries for kids in community parks.', img: 'https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=800' },
                    { id: 3, name: 'Youth Health Seminar', date: 'June 10, 2026', tag: 'Health', desc: 'A mental health awareness talk for high school students.', img: 'https://images.unsplash.com/photo-1505373877841-8d25f7d46678?auto=format&fit=crop&w=800' }
                ],
                roles: [
                    { id: 1, title: 'Chapter Leader', desc: 'Manage a local YSP group and coordinate monthly volunteer events.', time: '10 hrs/week' },
                    { id: 2, title: 'Social Media Officer', desc: 'Create content and manage engagement for our digital platforms.', time: '5 hrs/week' },
                    { id: 3, title: 'Project Secretary', desc: 'Handle event documentation and volunteer attendance reports.', time: '8 hrs/week' }
                ],
                certificates: [
                    { id: 1, name: 'Verified Volunteer', date: 'March 01, 2026', type: 'Service' },
                    { id: 2, name: 'Leadership 101 Graduate', date: 'February 15, 2026', type: 'Course' }
                ],
                joinedEvents: [],

                isJoined(id) { return this.joinedEvents.some(e => e.id === id); },
                joinEvent(event) { if (!this.isJoined(event.id)) { this.joinedEvents.push(event); } },
                leaveEvent(id) { this.joinedEvents = this.joinedEvents.filter(e => e.id !== id); },
                logout() {
                    localStorage.removeItem('userName');
                    window.location.href = 'index.html';
                }
            }
        }
    </script>
</body>
</html>
